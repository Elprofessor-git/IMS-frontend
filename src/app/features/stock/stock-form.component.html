<h2 mat-dialog-title>{{ isEditMode ? 'Modifier le Stock' : 'Ajouter au Stock' }}</h2>

<mat-dialog-content [formGroup]="form">
  <mat-form-field appearance="outline">
    <mat-label>Article</mat-label>
    <mat-select formControlName="articleId" required>
      <mat-option *ngFor="let article of articles" [value]="article.id">
        {{ article.designation }}
      </mat-option>
    </mat-select>
    <mat-error *ngIf="form.get('articleId')?.hasError('required')">L'article est requis.</mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Quantité</mat-label>
    <input matInput type="number" formControlName="quantite" required>
    <mat-error *ngIf="form.get('quantite')?.hasError('required')">La quantité est requise.</mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Prix Unitaire</mat-label>
    <input matInput type="number" formControlName="prixUnitaire" required>
    <mat-error *ngIf="form.get('prixUnitaire')?.hasError('required')">Le prix est requis.</mat-error>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Emplacement</mat-label>
    <input matInput formControlName="emplacementPhysique">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Couleur</mat-label>
    <input matInput formControlName="couleur">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Taille</mat-label>
    <input matInput formControlName="taille">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Numéro de Lot</mat-label>
    <input matInput formControlName="numeroLot">
  </mat-form-field>

  <mat-spinner [diameter]="50" *ngIf="isLoading"></mat-spinner>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Annuler</button>
  <button mat-raised-button color="primary" (click)="onSave()" [disabled]="isLoading || form.invalid">
    Enregistrer
  </button>
</mat-dialog-actions>
